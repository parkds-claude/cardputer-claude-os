name = "push-to-claude"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# ---- Push-to-Claude (single-turn chat memory) -------------------------
# Last ~8 messages per device-secret kept here with a 24h TTL so
# follow-up questions retain context. ID is filled in after running:
#   npx wrangler kv namespace create HISTORY
[[kv_namespaces]]
binding = "HISTORY"
id = "0fbadad86ef841e48efc12641ccabc58"

# ---- Bundler rules ----------------------------------------------------
# console.html is imported as a string by console_routes.js. Kept so
# the existing import graph still resolves; Pager/Console surfaces are
# not wired in this Gemini-only build.
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# ---- Secrets (set via `npx wrangler secret put`, not committed) -------
# DEVICE_SECRET     — auth for Push-to-Claude
# GEMINI_API_KEY    — Gemini 2.5 Flash (chat + audio STT in one call)
